name: Build and Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true     # Kéo theme Blowfish (git submodule) về
          fetch-depth: 0       # Lấy đủ lịch sử Git cho .LastMod của Hugo

      # Bước 1: Validate hạ tầng — kiểm tra Docker Image build được không
      - name: Validate Production Docker Image
        run: |
          docker build -t hugo-blog-prod:ci .
          echo "✅ Docker image size:"
          docker images hugo-blog-prod:ci --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      # Bước 2: Build Hugo ra folder public/ bằng image đã đúng version
      - name: Build Hugo Static Files
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            hugomods/hugo:exts \
            hugo --minify --gc

      # Bước 3: Deploy thư mục public/ lên Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: theor-devops
